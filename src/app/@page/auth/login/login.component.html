<div class="login-container  mt-5 pt-5 pb-5" >
    <img 
        src="https://assets.ccbp.in/frontend/react-js/nxt-trendz-logo-img.png"
        alt="Cartiva Logo"
        class="website-logo mb-4 d-md-none"
    />
    <img 
        src="https://assets.ccbp.in/frontend/react-js/nxt-trendz-login-img.png"
        alt="website login img"
        class="website-login-img"
    />
    <form class="form-container d-flex flex-column mt-4" [formGroup]="loginFormFg" (ngSubmit)="onClickLogin()">
        <div class="d-sm-block d-md-block">
            <img 
                src="https://assets.ccbp.in/frontend/react-js/nxt-trendz-logo-img.png"
                alt="Cartiva Logo"
                class="website-logo website-logo-for-form mb-4"
            />
        </div>
        <div class="d-flex flex-column mb-4">
            <label for="username" class="form-label">USERNAME</label>
            <input 
                type="text" 
                id="username" 
                class="form-input form-control w-100" 
                placeholder="Username"
                formControlName="username"
            />
        </div>
        <div class="d-flex flex-column">
            <label for="password" class="form-label">PASSWORD</label>
            <input 
                type="password" 
                id="password" 
                class="form-input form-control w-100" 
                placeholder="Password"
                formControlName="password"
            />
        </div>
        <button 
            type="submit" 
            class="w-90 fw-bold btn btn-primary mt-4">
            LOGIN
        </button>
    </form>
</div>
