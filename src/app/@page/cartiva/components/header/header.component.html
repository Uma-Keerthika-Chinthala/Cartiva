<nav class="navbar sticky-top" style="background: var(--color-background-primary); border-bottom: 0.5px solid var(--color-border-tertiary); padding: 0 1.5rem;">

  <div class="d-flex align-items-center justify-content-between w-100">

    <!-- Logo -->
    <a routerLink="/home">
      <img
        src="https://assets.ccbp.in/frontend/react-js/nxt-trendz-logo-img.png"
        alt="Cartiva Logo"
        style="width: 120px; object-fit: contain;"
      />
    </a>

    <!-- Desktop Nav Links -->
    <ul class="nav-menu-list d-none d-md-flex align-items-center gap-1 mb-0">
      <li><a routerLink="/home" routerLinkActive="nav-active" class="nav-link-item">🏠 Home</a></li>
      <li><a routerLink="/products" routerLinkActive="nav-active" class="nav-link-item">🛍️ Products</a></li>
      <li><a routerLink="/productmanagement" routerLinkActive="nav-active" class="nav-link-item">🛠️ Manage</a></li>
      <li>
        <a routerLink="/cart" routerLinkActive="nav-active" class="nav-link-item">
          🛒 Cart <span class="cart-badge">3</span>
        </a>
      </li>
    </ul>

    <!-- Desktop Right Side -->
    <div class="d-none d-md-flex align-items-center gap-3">
      <div class="search-box d-flex align-items-center">
        <input type="text" placeholder="Search products..." class="search-input" />
        <button class="search-btn">🔍</button>
      </div>
      <div class="user-avatar">R</div>
      <button class="logout-btn">Logout</button>
    </div>

    <!-- Mobile Hamburger Button -->
    <button class="hamburger-btn d-md-none" (click)="toggleMenu()">
      <span [class]="isMenuOpen() ? 'close-icon' : 'burger-icon'">
        {{ isMenuOpen() ? '✕' : '☰' }}
      </span>
    </button>

  </div>

  <!-- Mobile Menu Dropdown -->
  @if (isMenuOpen()) {
    <div class="mobile-menu">
      <ul class="mobile-nav-list">
        <li>
          <a routerLink="/home" routerLinkActive="nav-active"
             class="mobile-nav-link" (click)="toggleMenu()">
            🏠 Home
          </a>
        </li>
        <li>
          <a routerLink="/products" routerLinkActive="nav-active"
             class="mobile-nav-link" (click)="toggleMenu()">
            🛍️ Products
          </a>
        </li>
        <li>
          <a routerLink="/productmanagement" routerLinkActive="nav-active"
             class="mobile-nav-link" (click)="toggleMenu()">
            🛠️ Manage
          </a>
        </li>
        <li>
          <a routerLink="/cart" routerLinkActive="nav-active"
             class="mobile-nav-link" (click)="toggleMenu()">
            🛒 Cart <span class="cart-badge">3</span>
          </a>
        </li>
      </ul>

      <!-- Mobile Bottom Row -->
      <div class="mobile-bottom">
        <div class="search-box d-flex align-items-center w-100">
          <input type="text" placeholder="Search products..." class="search-input w-100"/>
          <button class="search-btn">🔍</button>
        </div>
        <div class="d-flex align-items-center justify-content-between mt-3">
          <div class="user-avatar">R</div>
          <button class="logout-btn">Logout</button>
        </div>
      </div>
    </div>
  }

</nav>
