<ng-container>
    <app-header></app-header>
    <div class="container mt-4">
        <!-- Total Count Badge -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold">All Products</h5>
            <div class="d-flex align-items-center gap-2">
                <div>
                    <select class="form-select w-100" [value]="selectedCategory()"
                        (change)="selectedCategory.set($any($event.target).value)">
                        <option value="">All Categories</option>
                        @for( category of categories(); track category) {
                        <option [value]="category">
                            {{category | titlecase}}
                        </option>
                        }
                    </select>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" placeholder="Search Product" class="form-control border-start-0" [value]="searchQuery()"
                        (input)="onSearchProduct($event)" />
                </div>
                <!-- <span class="badge bg-primary">
                    {{ totalCount() }} Products 
                </span> -->
            </div>
        </div>

        @if(loading()){
        <div class="text-center mt-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Fetching products...</p>
        </div>
        }

        <!-- ✅ Computed signal -->
        @if (hasError()) {
        <div class="alert alert-danger mt-3">
            ❌ {{ error() }}
        </div>
        }

        <!-- Products Grid -->
        @if (hasProducts()) {
        <app-product-item [productsList]="filteredProducts()"></app-product-item>
        }

        <!-- ✅ Computed signal -->
        @if (isEmpty()) {
        <div class="text-center mt-5">
            <p class="text-muted">No products found.</p>
        </div>
        }

    </div>
</ng-container>
